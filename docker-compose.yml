services:
  postgres:
    image: postgis/postgis:15-3.4
    container_name: baraqah-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-baraqah}
      POSTGRES_USER: ${POSTGRES_USER:-baraqah}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-baraqah_secret_change_me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-baraqah} -d ${POSTGRES_DB:-baraqah}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7.0
    container_name: baraqah-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-baraqah}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-baraqah_mongo_secret}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-baraqah}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: baraqah-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-node:
    build:
      context: ./backend-node
      dockerfile: Dockerfile
    container_name: baraqah-backend-node
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      MONGO_HOST: mongodb
      REDIS_HOST: redis
      PYTHON_ML_URL: http://backend-python:8000
    ports:
      - "${NODE_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend-node/src:/app/src:ro

  backend-python:
    build:
      context: ./backend-python
      dockerfile: Dockerfile
    container_name: baraqah-backend-python
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      MONGO_HOST: mongodb
      REDIS_HOST: redis
    ports:
      - "${PYTHON_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend-python/app:/app/app:ro

  nginx:
    image: nginx:1.25-alpine
    container_name: baraqah-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./mobile/build/web:/usr/share/nginx/html:ro
    depends_on:
      - backend-node
      - backend-python

volumes:
  postgres_data:
  mongo_data:
  redis_data:
